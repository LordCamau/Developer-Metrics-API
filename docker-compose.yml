version: "3.9"

services:
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/devmetrics
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me
      - GITHUB_TOKEN=
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build: .
    command: python -m src.workers.worker
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/devmetrics
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me
      - GITHUB_TOKEN=
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=devmetrics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
